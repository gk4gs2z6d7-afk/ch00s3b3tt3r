<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGNAL — Newsroom · Structural Humanism</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&family=Spectral:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0a08;
  --bg1:      #0f0d09;
  --bg2:      #131009;
  --bg3:      #16130d;
  --bg4:      #1d1810;
  --border:   #2c2618;
  --border2:  #3a3320;
  --text:     #e9e2d0;
  --text2:    #a89e86;
  --text3:    #6f6750;
  --accent:   #caa04a;
  --accent2:  #7c5e2a;
  --red:      #a8423a;
  --green:    #5d6240;
  --blue:     #2980b9;
  --orange:   #e67e22;
  --purple:   #8e44ad;
  --mono: 'Courier Prime', 'Courier New', monospace;
  --sans: 'Spectral', Georgia, serif;
  --xs: clamp(0.65rem, 0.6rem + 0.2vw, 0.75rem);
  --sm: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --base: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --lg: clamp(1rem, 0.9rem + 0.5vw, 1.25rem);
  --xl: clamp(1.25rem, 1rem + 1vw, 1.75rem);
  --trans: 160ms cubic-bezier(0.16, 1, 0.3, 1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:var(--base);min-height:100dvh;line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:rgba(200,169,110,0.2)}
:focus-visible{outline:1px solid var(--accent);outline-offset:2px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}


/* SITE BAR */
.sitebar{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:10px 1.5rem;background:#070605;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase}
.sitebar a{color:var(--text2);text-decoration:none;padding:4px 8px;border-radius:2px;transition:.18s}
.sitebar a:hover{color:var(--text);background:var(--bg3)}
.sitebar .home{color:var(--accent);font-weight:700;letter-spacing:2px}
.sitebar .links{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}

/* LAYOUT */
.shell{display:grid;grid-template-rows:auto 1fr;min-height:100dvh}
.topbar{
  background:var(--bg1);border-bottom:1px solid var(--border);
  padding:0 1.5rem;height:48px;
  display:flex;align-items:center;gap:1.5rem;
  position:sticky;top:0;z-index:100;
}
.logo{
  font-family:var(--mono);font-size:var(--lg);font-weight:600;
  letter-spacing:0.15em;color:var(--accent);white-space:nowrap;
  display:flex;align-items:center;gap:0.5rem;
}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.topbar-date{font-family:var(--mono);font-size:var(--xs);color:var(--text3);letter-spacing:0.05em}
.topbar-status{
  margin-left:auto;display:flex;align-items:center;gap:0.75rem;
  font-family:var(--mono);font-size:var(--xs);color:var(--text3);
}
.status-live{color:var(--green);display:flex;align-items:center;gap:0.35rem}
.status-live::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 1.5s ease-in-out infinite}
.topbar-btn{
  padding:0.25rem 0.75rem;border:1px solid var(--border2);border-radius:2px;
  font-family:var(--mono);font-size:var(--xs);color:var(--text2);
  letter-spacing:0.05em;transition:all var(--trans);
}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent)}
.topbar-updated{font-family:var(--mono);font-size:var(--xs);color:var(--text3);white-space:nowrap}
.topbar-updated .next{color:var(--text3);opacity:0.6}
@keyframes refreshFlash{0%,100%{opacity:1}50%{opacity:0.2}}
.refreshing .logo-dot{animation:refreshFlash 0.6s ease-in-out 3}

.body{display:grid;grid-template-columns:220px 1fr;min-height:0}
@media(max-width:900px){.body{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{
  background:var(--bg1);border-right:1px solid var(--border);
  position:sticky;top:48px;height:calc(100vh - 48px);
  overflow-y:auto;padding:1.25rem 0;
  display:flex;flex-direction:column;gap:0.25rem;
}
@media(max-width:900px){.sidebar{display:none}}
.sidebar-label{
  font-family:var(--mono);font-size:var(--xs);color:var(--text3);
  letter-spacing:0.12em;text-transform:uppercase;
  padding:0.75rem 1rem 0.35rem;
}
.nav-btn{
  display:flex;align-items:center;gap:0.65rem;
  padding:0.5rem 1rem;font-size:var(--sm);
  color:var(--text2);transition:all var(--trans);
  border-left:2px solid transparent;width:100%;text-align:left;
}
.nav-btn:hover{color:var(--text);background:var(--bg2)}
.nav-btn.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg2)}
.nav-btn .beat-icon{font-size:0.9rem;opacity:0.7;width:16px;text-align:center}
.sidebar-divider{height:1px;background:var(--border);margin:0.75rem 1rem}

/* MOBILE BEATS */
.mobile-beats{
  display:none;background:var(--bg1);border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;padding:0.5rem 1rem;gap:0.5rem;
}
.mobile-beats::-webkit-scrollbar{display:none}
@media(max-width:900px){.mobile-beats{display:flex}}
.beat-chip{
  padding:0.3rem 0.75rem;border:1px solid var(--border2);border-radius:2px;
  font-family:var(--mono);font-size:var(--xs);color:var(--text2);
  white-space:nowrap;transition:all var(--trans);flex-shrink:0;
}
.beat-chip:hover{border-color:var(--accent);color:var(--accent)}
.beat-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,0.08)}

/* MAIN */
.main{overflow-y:auto;padding:1.5rem 2rem}
@media(max-width:768px){.main{padding:1rem}}

.section-header{
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.25rem;padding-bottom:0.75rem;
  border-bottom:1px solid var(--border);
}
.section-title{
  font-family:var(--mono);font-size:var(--xl);font-weight:600;
  color:var(--accent);letter-spacing:0.08em;
}
.section-sub{font-family:var(--mono);font-size:var(--xs);color:var(--text3)}
.refresh-btn{
  margin-left:auto;padding:0.25rem 0.75rem;
  border:1px solid var(--border2);border-radius:2px;
  font-family:var(--mono);font-size:var(--xs);color:var(--text2);
  transition:all var(--trans);
}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.loading-spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* DAILY BRIEFING BANNER */
.briefing-banner{
  background:var(--bg2);border:1px solid var(--border2);
  border-left:3px solid var(--accent);
  padding:1rem 1.25rem;margin-bottom:1.5rem;
  display:flex;align-items:flex-start;gap:1rem;
}
.briefing-label{
  font-family:var(--mono);font-size:var(--xs);color:var(--accent);
  letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;margin-top:0.1rem;
}
.briefing-text{font-size:var(--sm);color:var(--text2);line-height:1.7}

/* STORY CARD */
.story-card{
  background:var(--bg1);border:1px solid var(--border);
  margin-bottom:0.75rem;transition:border-color var(--trans);
}
.story-card:hover{border-color:var(--border2)}
.story-main{padding:1rem 1.25rem}
.story-meta{
  display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;
  margin-bottom:0.5rem;
}
.beat-tag{
  font-family:var(--mono);font-size:var(--xs);letter-spacing:0.08em;
  text-transform:uppercase;padding:0.15rem 0.4rem;border:1px solid;
  border-radius:1px;
}
.story-time{font-family:var(--mono);font-size:var(--xs);color:var(--text3)}
.story-headline{
  font-size:var(--lg);font-weight:500;line-height:1.35;
  color:var(--text);margin-bottom:0.5rem;
}
.story-headline a:hover{color:var(--accent)}
.story-summary{font-size:var(--sm);color:var(--text2);line-height:1.7;margin-bottom:0.75rem}

/* SOURCE TRACKER */
.source-tracker{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:0.75rem 1.25rem;
}
.source-tracker-label{
  font-family:var(--mono);font-size:var(--xs);color:var(--text3);
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.5rem;
}
.source-list{display:flex;flex-direction:column;gap:0.3rem}
.source-row{
  display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;
}
.source-name{font-family:var(--mono);font-size:var(--sm);color:var(--text);font-weight:500}
.source-owner{font-size:var(--xs);color:var(--text3)}
.owner-tag{
  font-family:var(--mono);font-size:var(--xs);padding:0.1rem 0.4rem;
  border-radius:1px;border:1px solid;
}
.owner-corp{color:var(--red);border-color:rgba(192,57,43,0.4);background:rgba(192,57,43,0.06)}
.owner-indie{color:var(--green);border-color:rgba(39,174,96,0.4);background:rgba(39,174,96,0.06)}
.owner-nonprofit{color:var(--blue);border-color:rgba(41,128,185,0.4);background:rgba(41,128,185,0.06)}
.source-link{
  font-family:var(--mono);font-size:var(--xs);color:var(--accent);margin-left:auto;
  opacity:0.7;transition:opacity var(--trans);
}
.source-link:hover{opacity:1}

/* CONTESTED FACTS */
.contested{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:0.75rem 1.25rem;
}
.contested-label{
  font-family:var(--mono);font-size:var(--xs);color:var(--orange);
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.5rem;
  display:flex;align-items:center;gap:0.4rem;
}
.contested-label::before{content:'⚠';font-size:0.7rem}
.contested-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
@media(max-width:500px){.contested-grid{grid-template-columns:1fr}}
.contested-side{background:var(--bg3);border:1px solid var(--border2);padding:0.6rem 0.75rem}
.contested-source{font-family:var(--mono);font-size:var(--xs);color:var(--text3);margin-bottom:0.2rem;text-transform:uppercase;letter-spacing:0.06em}
.contested-claim{font-size:var(--sm);color:var(--text);font-weight:500}
.contested-note{font-size:var(--xs);color:var(--text2);margin-top:0.2rem}

/* STORY ACTIONS */
.story-actions{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.5rem 1.25rem;border-top:1px solid var(--border);
  background:var(--bg2);
}
.action-btn{
  font-family:var(--mono);font-size:var(--xs);color:var(--text3);
  padding:0.25rem 0.6rem;border:1px solid transparent;border-radius:1px;
  transition:all var(--trans);letter-spacing:0.04em;display:flex;align-items:center;gap:0.3rem;
}
.action-btn:hover{border-color:var(--border2);color:var(--text2)}
.action-btn.flagged{color:var(--accent);border-color:var(--accent2)}

/* POWER MOVES */
.power-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:0.75rem;margin-bottom:1.5rem}
.power-card{
  background:var(--bg1);border:1px solid var(--border);
  padding:1rem 1.25rem;
  transition:border-color var(--trans);
}
.power-card:hover{border-color:var(--border2)}
.power-header{display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:0.5rem}
.power-icon{
  width:32px;height:32px;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;flex-shrink:0;background:var(--bg2);
}
.power-name{font-family:var(--mono);font-size:var(--sm);color:var(--accent);font-weight:600}
.power-entity{font-size:var(--xs);color:var(--text3)}
.power-move{font-size:var(--sm);color:var(--text);line-height:1.55}
.power-delta{
  margin-top:0.5rem;font-family:var(--mono);font-size:var(--xs);
  display:flex;align-items:center;gap:0.4rem;
}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-neutral{color:var(--text3)}

/* MARKET TICKER */
.ticker-bar{
  background:var(--bg1);border:1px solid var(--border);
  padding:0.75rem 1.25rem;margin-bottom:1.5rem;
  overflow-x:auto;scrollbar-width:none;
}
.ticker-bar::-webkit-scrollbar{display:none}
.ticker-inner{display:flex;gap:1.5rem;min-width:max-content}
.ticker-item{display:flex;flex-direction:column;align-items:flex-start;gap:0.1rem}
.ticker-sym{font-family:var(--mono);font-size:var(--xs);color:var(--text3);letter-spacing:0.08em}
.ticker-val{font-family:var(--mono);font-size:var(--sm);font-weight:500}
.ticker-chg{font-family:var(--mono);font-size:var(--xs)}

/* SAVED PANEL */
.saved-panel{
  position:fixed;right:0;top:0;bottom:0;width:360px;z-index:200;
  background:var(--bg1);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.saved-panel.open{transform:translateX(0)}
.saved-header{
  padding:1rem 1.25rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:1rem;
  font-family:var(--mono);font-size:var(--sm);color:var(--accent);
  letter-spacing:0.08em;text-transform:uppercase;
}
.saved-close{margin-left:auto;color:var(--text2);font-size:1.1rem;padding:0.25rem}
.saved-body{flex:1;overflow-y:auto;padding:1rem}
.saved-empty{
  color:var(--text3);font-size:var(--sm);
  text-align:center;padding:2rem 1rem;
  font-family:var(--mono);
}
.saved-item{
  background:var(--bg2);border:1px solid var(--border);
  padding:0.75rem;margin-bottom:0.5rem;
  display:flex;flex-direction:column;gap:0.4rem;
}
.saved-item-title{font-size:var(--sm);color:var(--text);line-height:1.4}
.saved-item-note{
  font-size:var(--xs);color:var(--text2);font-style:italic;
  border-left:2px solid var(--accent2);padding-left:0.4rem;
}
.saved-item-meta{font-family:var(--mono);font-size:var(--xs);color:var(--text3)}
.saved-item-actions{display:flex;gap:0.4rem;margin-top:0.25rem}
.saved-del{font-family:var(--mono);font-size:var(--xs);color:var(--text3);transition:color var(--trans)}
.saved-del:hover{color:var(--red)}

/* NOTE MODAL */
.note-modal{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
}
.note-modal.open{display:flex}
.note-box{
  background:var(--bg2);border:1px solid var(--border2);
  width:min(440px,90vw);padding:1.5rem;
  display:flex;flex-direction:column;gap:1rem;
}
.note-box h3{font-family:var(--mono);font-size:var(--sm);color:var(--accent);letter-spacing:0.08em}
.note-headline{font-size:var(--sm);color:var(--text2);line-height:1.5;
  border-left:2px solid var(--border2);padding-left:0.75rem}
.note-textarea{
  background:var(--bg1);border:1px solid var(--border2);
  color:var(--text);font-family:var(--sans);font-size:var(--sm);
  padding:0.75rem;resize:vertical;min-height:80px;outline:none;
  transition:border-color var(--trans);
}
.note-textarea:focus{border-color:var(--accent)}
.note-actions{display:flex;gap:0.5rem;justify-content:flex-end}
.btn-cancel{
  padding:0.4rem 1rem;border:1px solid var(--border2);
  font-family:var(--mono);font-size:var(--xs);color:var(--text2);
  transition:all var(--trans);
}
.btn-cancel:hover{border-color:var(--text2)}
.btn-save{
  padding:0.4rem 1rem;background:var(--accent);color:var(--bg);
  font-family:var(--mono);font-size:var(--xs);font-weight:600;
  transition:opacity var(--trans);
}
.btn-save:hover{opacity:0.85}

/* SKELETON */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{
  background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.8s ease-in-out infinite;
}
.skel-card{background:var(--bg1);border:1px solid var(--border);padding:1rem 1.25rem;margin-bottom:0.75rem}
.skel-line{height:13px;border-radius:1px;margin-bottom:0.5rem}
.skel-block{height:60px;border-radius:1px;margin-bottom:0.5rem}

/* ERROR */
.err-bar{
  background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);
  padding:0.6rem 1rem;font-family:var(--mono);font-size:var(--xs);
  color:var(--red);margin-bottom:1rem;display:none;
}

/* BEAT COLORS */
.beat-politics{color:#5dade2;border-color:rgba(93,173,226,0.35);background:rgba(93,173,226,0.06)}
.beat-war{color:#e74c3c;border-color:rgba(231,76,60,0.35);background:rgba(231,76,60,0.06)}
.beat-trade{color:#f39c12;border-color:rgba(243,156,18,0.35);background:rgba(243,156,18,0.06)}
.beat-economy{color:#2ecc71;border-color:rgba(46,204,113,0.35);background:rgba(46,204,113,0.06)}
.beat-stocks{color:#1abc9c;border-color:rgba(26,188,156,0.35);background:rgba(26,188,156,0.06)}
.beat-business{color:#e67e22;border-color:rgba(230,126,34,0.35);background:rgba(230,126,34,0.06)}
.beat-religion{color:#9b59b6;border-color:rgba(155,89,182,0.35);background:rgba(155,89,182,0.06)}
.beat-science{color:#3498db;border-color:rgba(52,152,219,0.35);background:rgba(52,152,219,0.06)}
.beat-china{color:#e74c3c;border-color:rgba(231,76,60,0.35);background:rgba(231,76,60,0.06)}
.beat-russia{color:#c0392b;border-color:rgba(192,57,43,0.35);background:rgba(192,57,43,0.06)}
.beat-corruption{color:#e74c3c;border-color:rgba(231,76,60,0.35);background:rgba(231,76,60,0.06)}
.beat-lawpolicy{color:#58a6ff;border-color:rgba(88,166,255,0.35);background:rgba(88,166,255,0.06)}
.beat-history{color:#d29922;border-color:rgba(210,153,34,0.35);background:rgba(210,153,34,0.06)}
</style>
</head>
<body>
<div class="sitebar">
  <a class="home" href="index.html">&larr; Structural Humanism</a>
  <div class="links">
    <a href="index.html#files">Case Files</a>
    <a href="index.html#act">Act</a>
    <a href="index.html#book">The Book</a>
    <a href="index.html#contact">Contact</a>
  </div>
</div>

<div class="shell">

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">
    <span class="logo-dot"></span>
    SIGNAL
  </div>
  <span class="topbar-date" id="topDate"></span>
  <div class="topbar-status">
    <span class="status-live">LIVE</span>
    <span class="topbar-updated" id="topUpdated"></span>
    <button class="topbar-btn" id="openSaved">📌 SAVED (<span id="savedCount">0</span>)</button>
  </div>
</header>

<!-- MOBILE BEATS -->
<div class="mobile-beats" id="mobileBeats"></div>

<div class="body">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-label">Briefing</div>
  <button class="nav-btn" data-beat="briefing"><span class="beat-icon">📋</span>Daily Briefing</button>
  <button class="nav-btn" data-beat="powerMoves"><span class="beat-icon">⚡</span>Power Moves</button>
  <div class="sidebar-divider"></div>
  <div class="sidebar-label">Beats</div>
  <button class="nav-btn active" data-beat="lawpolicy"><span class="beat-icon">⚖</span>U.S. Law &amp; Policy</button>

// ── RSS FETCH ─────────────────────────────────────────────────────
const RSS2JSON = 'https://api.rss2json.com/v1/api.json';

function buildRSS(q){
  return 'https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=en-US&gl=US&ceid=US:en';
}

function parseRSSXml(xmlStr){
  try{
    const doc = new DOMParser().parseFromString(xmlStr,'text/xml');
    if(doc.querySelector('parsererror')) return null;
    return Array.from(doc.querySelectorAll('item')).slice(0,15).map(item=>{
      const title  = item.querySelector('title')?.textContent||'Untitled';
      const link   = item.querySelector('link')?.textContent?.trim()||
                     item.querySelector('guid')?.textContent?.trim()||'#';
      const time   = item.querySelector('pubDate')?.textContent||'';
      const desc   = item.querySelector('description')?.textContent||'';
      const source = item.querySelector('source')?.textContent?.trim()||extractSource(title);
      const clean  = source&&title.endsWith(' - '+source)?title.slice(0,-(' - '+source).length):title;
      return {
        id: btoa(unescape(encodeURIComponent(link))).slice(0,12),
        title:clean, summary:desc.replace(/<[^>]+>/g,'').slice(0,220),
        link, source, time,
      };
    });
  }catch(e){ return null; }
}

async function fetchArticles(query){
  const rssUrl = buildRSS(query);

  // Strategy 1: allorigins.win — free CORS proxy, no API key
  try{
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(),9000);
    const res = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(rssUrl),{signal:ctrl.signal});
    clearTimeout(t);
    const data = await res.json();
    if(data.contents){
      const parsed = parseRSSXml(data.contents);
      if(parsed&&parsed.length) return parsed;
    }
  }catch(e){}

  // Strategy 2: rss2json fallback
  try{
    const ctrl = new AbortController();
    const t = setTimeout(()=>ctrl.abort(),9000);
    const res = await fetch(RSS2JSON+'?rss_url='+encodeURIComponent(rssUrl)+'&count=15',{signal:ctrl.signal});
    clearTimeout(t);
    const data = await res.json();
    if(data.status==='ok'){
      return (data.items||[]).map(a=>{
        const source = a.author||extractSource(a.title);
        let title = a.title||'Untitled';
        if(source&&title.endsWith(' - '+source)) title=title.slice(0,-(' - '+source).length);
        return {
          id: btoa(unescape(encodeURIComponent(a.link||String(Math.random())))).slice(0,12),
          title,
          summary:(a.description||'').replace(/<[^>]+>/g,'').slice(0,220),
          link:a.link||'#', source, time:a.pubDate,
        };
      });
    }
  }catch(e){}

  return null; // honest failure — never fabricate articles
}

function extractSource(title){
  // Google News titles end with " - Source Name"; take last segment so hyphens in headlines don't break it
  const parts = (title||'').split(' - ');
  return parts.length > 1 ? parts[parts.length-1].trim() : 'Unknown';
}

function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(d){
  if(!d) return '';
  const diff=(Date.now()-new Date(d))/1000;
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

    btn.addEventListener('click',()=>{
      const id = btn.dataset.flag;
      const title = btn.dataset.title;
      const already = state.saved.some(s=>s.id===id);
      if(already){
        state.saved = state.saved.filter(s=>s.id!==id);
        persistSaved();
        btn.textContent='📌 FLAG FOR SITE';
        btn.classList.remove('flagged');
        updateSavedCount();
        renderSavedPanel();
      } else {
        openNoteModal(id, title, btn);
      }
    });
  });
}

function openNoteModal(id, title, btn){
  pendingFlag={id,title,btn};
  document.getElementById('noteHeadline').textContent=title;
  document.getElementById('noteText').value='';
  document.getElementById('noteModal').classList.add('open');
  setTimeout(()=>document.getElementById('noteText').focus(),100);
}
document.getElementById('cancelNote').addEventListener('click',()=>{
  document.getElementById('noteModal').classList.remove('open');
  pendingFlag=null;
});
document.getElementById('confirmNote').addEventListener('click',()=>{
  if(!pendingFlag) return;
  const note = document.getElementById('noteText').value.trim();
  state.saved.push({
    id:pendingFlag.id,
    title:pendingFlag.title,
    note,
    time:new Date().toISOString(),
    beat:state.beat,
  });
  if(pendingFlag.btn){
    pendingFlag.btn.textContent='📌 FLAGGED';
    pendingFlag.btn.classList.add('flagged');
  }
  persistSaved();
  document.getElementById('noteModal').classList.remove('open');
  pendingFlag=null;
  updateSavedCount();
  renderSavedPanel();
});

    document.getElementById('noteModal').classList.remove('open');

// ── AUTO-REFRESH ──────────────────────────────────────────────────
const REFRESH_MS = 30 * 60 * 1000; // 30 minutes
let lastFetchTime = null;
let nextRefreshAt = null;
let countdownTimer = null;

function markFetched(){
  lastFetchTime = Date.now();
  nextRefreshAt = lastFetchTime + REFRESH_MS;
  updateUpdatedLabel();
}

function updateUpdatedLabel(){
  const el = document.getElementById('topUpdated');
  if(!el || !lastFetchTime) return;
  const ago = Math.round((Date.now()-lastFetchTime)/60000);
  const mins = Math.max(0, Math.round((nextRefreshAt-Date.now())/60000));
  const agoTxt = ago<1?'just now':`${ago}m ago`;
  el.innerHTML = `Updated ${agoTxt} <span class="next">· refresh in ${mins}m</span>`;
}

function startCountdown(){
  clearInterval(countdownTimer);
  countdownTimer = setInterval(updateUpdatedLabel, 60000);
}

async function autoRefresh(){
  const logo = document.querySelector('.logo');
  if(logo) logo.classList.add('refreshing');
  await loadBeat(state.beat);
  if(logo) setTimeout(()=>logo.classList.remove('refreshing'), 2000);
}

// Wrap the original loadBeat to mark fetch time on every manual load too
const _origLoadBeat = loadBeat;
loadBeat = async function(beat){
  await _origLoadBeat(beat);
  markFetched();
  startCountdown();
};

setInterval(autoRefresh, REFRESH_MS);

// ── INIT ──────────────────────────────────────────────────────────
updateSavedCount();
loadBeat('lawpolicy');
})();
</script>
